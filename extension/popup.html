<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <h1>Job Tracker</h1>

    <div id="status-msg" class="hidden"></div>

    <section id="scraped-section">
      <h2>Detected Job</h2>
      <label>Title <input id="field-title" type="text" /></label>
      <label>Company <input id="field-company" type="text" /></label>
      <textarea id="field-description" placeholder="Job description..."></textarea>
      <button id="btn-save">Save Job</button>
    </section>

    <section id="manual-section">
      <details>
        <summary>Paste manually instead</summary>
        <label>Job URL <input id="manual-url" type="url" /></label>
        <label>Title <input id="manual-title" type="text" /></label>
        <label>Company <input id="manual-company" type="text" /></label>
        <textarea id="manual-description" placeholder="Paste job description..."></textarea>
        <button id="btn-manual-save">Save</button>
      </details>
    </section>
  </div>
  <script src="popup.js"></script>
</body>
</html>
